<!DOCTYPE html>
<html>
<head>
  <title>Factorial Calculator</title>
</head>
<body>
  <script>
    console.log("This is a factorial calculator");

    let fact = 1;
    let num = Number(prompt("Enter a number = "));

    for (let i = 1; i <= num; i++) {
      fact = fact * i;
    }

    console.log("The factorial is = " + fact);
    alert("The factorial is = " + fact);
  </script>
</body>
</html>
