<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling</title>
    <style>
        .child {
            border: 2px solid black;
            background-color: blue;
            padding: 20px 50px;
        }

        .childcontainer {
            background-color: yellow;
            padding: 20px 50px;
        }

        .container {
            background-color: aqua;
            padding: 20px 50px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="childcontainer">
            <div class="child">
                i am child
            </div>
        </div>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click", (e) => {
            e.stopPropagation();
            alert("Child was clicked")
        });
        document.querySelector(".childcontainer").addEventListener("click", (e) => {
            e.stopPropagation();
            alert("Child container was clicked");

        })
        document.querySelector(".container").addEventListener("click", () => {
            alert(" container was clicked");

        })
        function getrandomcolor() {

            let val1 = Math.floor(Math.random() * 234);
            let val2 = Math.floor(Math.random() * 125);
            let val3 = Math.floor(Math.random() * 112);
            return `rgb(${val1}, ${val2}, ${val3})`;
        }


        let a = setInterval(() => {
            document.querySelector(".child").style.background = getrandomcolor();
            document.querySelector(".childcontainer").style.background = getrandomcolor();
            document.querySelector(".container").style.background = getrandomcolor();
        }, 500)


        // let a = setTimeout(() => {
        //     document.querySelector(".child").style.background = getrandomcolor();
        //     document.querySelector(".childcontainer").style.background = getrandomcolor();
        //     document.querySelector(".container").style.background = getrandomcolor();
        // }, 5000)
        // clearInterval(a);
    </script>
</body>

</html>
